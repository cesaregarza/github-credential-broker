name: Broker smoke test

on:
  workflow_dispatch:
    inputs:
      print_value:
        description: Print the returned fake test value to the workflow log.
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch smoke-test credential
        id: broker
        uses: cesaregarza/.github/actions/fetch-broker-credentials@main
        with:
          broker-url: https://credentials.garz.ai
          audience: https://credentials.garz.ai/v1
          capability: broker-smoke-test

      - name: Assert smoke-test credential
        env:
          AUDIT_JSON: ${{ steps.broker.outputs.audit }}
          CAPABILITY: ${{ steps.broker.outputs.capability }}
          EXPECTED_TEST_TOKEN: test_value
          PRINT_VALUE: ${{ inputs.print_value }}
          SECRETS_JSON: ${{ steps.broker.outputs.secrets-json }}
        shell: bash
        run: |
          set -euo pipefail
          value="$(jq -r '.TEST_TOKEN' <<< "$SECRETS_JSON")"
          echo "::add-mask::$value"

          if [[ "$value" != "$EXPECTED_TEST_TOKEN" ]]; then
            echo "TEST_TOKEN did not match expected smoke-test value" >&2
            exit 1
          fi

          echo "capability=$CAPABILITY"
          echo "audit=$AUDIT_JSON"
          echo "value_length=${#value}"
          if [[ "$PRINT_VALUE" == "true" ]]; then
            echo "TEST_TOKEN=$value"
          fi
