name: Broker smoke test

on:
  workflow_dispatch:
    inputs:
      print_value:
        description: Print the returned fake test value to the workflow log.
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

jobs:
  smoke:
    uses: cesaregarza/.github/.github/workflows/broker-smoke-test.yml@main
    permissions:
      contents: read
      id-token: write
    with:
      print_value: ${{ inputs.print_value }}
