  - description: SplatNet3_Scraper release workflow.
    allow:
      - repository: cesaregarza/SplatNet3_Scraper
        repository_id: "586660348"
        repository_owner_id: "40225001"
        ref: refs/heads/main
        workflow_ref: cesaregarza/SplatNet3_Scraper/.github/workflows/main.yaml@refs/heads/main
    capabilities:
