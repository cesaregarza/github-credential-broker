      - repository: cesaregarza/sendouq_analysis
        repository_id: "728435415"
        repository_owner_id: "40225001"
        ref: refs/heads/main
        environment: Scraper
        workflow_ref: cesaregarza/sendouq_analysis/.github/workflows/run_scraper.yml@refs/heads/main
      - repository: cesaregarza/sendouq_analysis
        repository_id: "728435415"
        repository_owner_id: "40225001"
        ref: refs/heads/main
        environment: Scraper
        workflow_ref: cesaregarza/sendouq_analysis/.github/workflows/run_aggregator.yml@refs/heads/main
    capabilities:
      - digitalocean-scraper-job-runner
      - scraper-postgres-db-write

  - description: Sendouq rankings workflows.
    allow:
      - repository: cesaregarza/sendouq_analysis
        repository_id: "728435415"
        repository_owner_id: "40225001"
        ref: refs/heads/main
        environment: Scraper
        workflow_ref: cesaregarza/sendouq_analysis/.github/workflows/fix_tournaments.yml@refs/heads/main
      - repository: cesaregarza/sendouq_analysis
        repository_id: "728435415"
