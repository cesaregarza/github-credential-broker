      - repository: cesaregarza/sendouq_analysis
        repository_id: "728435415"
        repository_owner_id: "40225001"
        ref: refs/heads/main
        environment: Scraper
        workflow_ref: cesaregarza/sendouq_analysis/.github/workflows/run_weekly_loo.yml@refs/heads/main
    capabilities:
      - digitalocean-scraper-job-runner
      - rankings-db-write
      - sendou-api-read
      - rankings-sentry-reporting

  - description: Sendouq ranked update workflow.
    allow:
      - repository: cesaregarza/sendouq_analysis
        repository_id: "728435415"
        repository_owner_id: "40225001"
        ref: refs/heads/main
