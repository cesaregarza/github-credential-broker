      - config-repo-write

  - description: SplatTopBlog production deploy workflow.
    allow:
      - repository: cesaregarza/SplatTopBlog
        repository_id: "1134030800"
        repository_owner_id: "40225001"
        ref: refs/heads/main
        environment: SplatTop
        workflow_ref: cesaregarza/SplatTopBlog/.github/workflows/deploy.yml@refs/heads/main
