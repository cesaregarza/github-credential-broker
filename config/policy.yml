      - digitalocean-k8s-deploy
      - config-repo-write

  - description: SplatTopTeams image publish workflow.
    allow:
      - repository: cesaregarza/SplatTopTeams
        repository_id: "1215338068"
        repository_owner_id: "40225001"
        ref: refs/heads/main
        environment: default
        workflow_ref: cesaregarza/SplatTopTeams/.github/workflows/verify_and_publish_images.yaml@refs/heads/main
    capabilities:
      - digitalocean-registry-write

  - description: SplatTopTeams refresh workflow.
    allow:
      - repository: cesaregarza/SplatTopTeams
        repository_id: "1215338068"
        repository_owner_id: "40225001"
        ref: refs/heads/main
        environment: default
        workflow_ref: cesaregarza/SplatTopTeams/.github/workflows/run_refresh.yaml@refs/heads/main
    capabilities:
      - digitalocean-team-search-refresh-runner
      - postgres-read-only
      - team-search-db-write

  - description: Sendouq scraper and aggregator workflows.
