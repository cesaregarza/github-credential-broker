version: 1

strict: true

# Strict mode requires repository_id in every allow rule. Repository names can
# be transferred, but IDs cannot.

defaults:
  audit_claims:
    - repository
    - ref
    - environment
    - workflow_ref
    - job_workflow_ref
    - run_id
    - run_attempt

capabilities:
  digitalocean-k8s-deploy:
    description: DigitalOcean credentials for Kubernetes deployment updates.
    secrets:
      DIGITALOCEAN_ACCESS_TOKEN:
        op: op://github-credential-broker-prod/digitalocean-k8s-deploy/DIGITALOCEAN_ACCESS_TOKEN
      DIGITALOCEAN_CLUSTER_ID:
        op: op://github-credential-broker-prod/digitalocean-k8s-deploy/DIGITALOCEAN_CLUSTER_ID

  digitalocean-registry-write:
    description: DigitalOcean token for writing images to DOCR.
    secrets:
      DIGITALOCEAN_ACCESS_TOKEN:
        op: op://github-credential-broker-prod/digitalocean-k8s-deploy/DIGITALOCEAN_ACCESS_TOKEN

  digitalocean-team-search-refresh-runner:
    description: DigitalOcean token and SSH material for the team-search refresh runner.
    secrets:
      DIGITALOCEAN_DATABASE_ID:
        op: op://github-credential-broker-prod/digitalocean-team-search-refresh-runner/DIGITALOCEAN_DATABASE_ID
      DIGITALOCEAN_ACCESS_TOKEN:
        op: op://github-credential-broker-prod/digitalocean-team-search-refresh-runner/DIGITALOCEAN_ACCESS_TOKEN
      DIGITALOCEAN_SSH_KEY_FINGERPRINT:
        op: op://github-credential-broker-prod/digitalocean-team-search-refresh-runner/DIGITALOCEAN_SSH_KEY_FINGERPRINT
      DIGITALOCEAN_SSH_KEY_ED:
        op: op://github-credential-broker-prod/digitalocean-team-search-refresh-runner/DIGITALOCEAN_SSH_KEY_ED

  team-search-refresh-db-write:
    description: Database URLs and schema for building team-search refresh snapshots.
    secrets:
      RANKINGS_DATABASE_URL:
        op: op://github-credential-broker-prod/team-search-refresh-db-write/RANKINGS_DATABASE_URL
      TEAM_SEARCH_SOURCE_DATABASE_URL:
        op: op://github-credential-broker-prod/team-search-refresh-db-write/TEAM_SEARCH_SOURCE_DATABASE_URL
      TEAM_SEARCH_TARGET_DATABASE_URL:
        op: op://github-credential-broker-prod/team-search-refresh-db-write/TEAM_SEARCH_TARGET_DATABASE_URL
      RANKINGS_DB_SCHEMA:
        op: op://github-credential-broker-prod/team-search-refresh-db-write/RANKINGS_DB_SCHEMA

  digitalocean-scraper-job-runner:
    description: DigitalOcean token, SSH key, and allowlisted host IP for scraper-style ephemeral jobs.
    secrets:
      DIGITALOCEAN_ACCESS_TOKEN:
        op: op://github-credential-broker-prod/digitalocean-scraper-job-runner/DIGITALOCEAN_ACCESS_TOKEN
      DIGITALOCEAN_SSH_KEY_ED:
        op: op://github-credential-broker-prod/digitalocean-scraper-job-runner/DIGITALOCEAN_SSH_KEY_ED
      JOY_IP:
        op: op://github-credential-broker-prod/digitalocean-scraper-job-runner/JOY_IP

  scraper-postgres-write:
    description: Legacy Postgres credentials for scraper and aggregator jobs.
    secrets:
      POSTGRES_USER:
        op: op://github-credential-broker-prod/scraper-postgres-write/POSTGRES_USER
      POSTGRES_PASSWORD:
        op: op://github-credential-broker-prod/scraper-postgres-write/POSTGRES_PASSWORD
      POSTGRES_HOST:
        op: op://github-credential-broker-prod/scraper-postgres-write/POSTGRES_HOST
      POSTGRES_PORT:
        op: op://github-credential-broker-prod/scraper-postgres-write/POSTGRES_PORT
      POSTGRES_DB:
        op: op://github-credential-broker-prod/scraper-postgres-write/POSTGRES_DB

  rankings-db-write:
    description: Rankings database URL and schema for rankings pipeline jobs.
    secrets:
      RANKINGS_DATABASE_URL:
        op: op://github-credential-broker-prod/rankings-db-write/RANKINGS_DATABASE_URL
      RANKINGS_DB_SCHEMA:
        op: op://github-credential-broker-prod/rankings-db-write/RANKINGS_DB_SCHEMA

  sendouq-api-read:
    description: Sendouq API token for rankings and tournament data pulls.
    secrets:
      SENDOU_KEY:
        op: op://github-credential-broker-prod/sendouq-api-read/SENDOU_KEY

  rankings-sentry-reporting:
    description: Sentry DSN for rankings pipeline error reporting.
    secrets:
      SENTRY_DSN:
        op: op://github-credential-broker-prod/rankings-sentry-reporting/SENTRY_DSN

  rankings-spaces-write:
    description: DigitalOcean Spaces credentials and destination for rankings artifact uploads.
    secrets:
      DIGITALOCEAN_SPACES_KEY:
        op: op://github-credential-broker-prod/rankings-spaces-write/DIGITALOCEAN_SPACES_KEY
      DIGITALOCEAN_SPACES_SECRET:
        op: op://github-credential-broker-prod/rankings-spaces-write/DIGITALOCEAN_SPACES_SECRET
      DIGITALOCEAN_SPACES_REGION:
        op: op://github-credential-broker-prod/rankings-spaces-write/DIGITALOCEAN_SPACES_REGION
      RANKINGS_S3_ENDPOINT:
        op: op://github-credential-broker-prod/rankings-spaces-write/RANKINGS_S3_ENDPOINT
      RANKINGS_S3_BUCKET:
        op: op://github-credential-broker-prod/rankings-spaces-write/RANKINGS_S3_BUCKET

  splatnet3-release-github-write:
    description: GitHub token for SplatNet3 package release automation and query-hash PR updates.
    secrets:
      CI_SN3S_TOKEN:
        op: op://github-credential-broker-prod/splatnet3-release-github-write/CI_SN3S_TOKEN

  splatnet3-package-pypi-publish:
    description: PyPI token for publishing the SplatNet3 package.
    secrets:
      PYPI_TOKEN:
        op: op://github-credential-broker-prod/splatnet3-package-pypi-publish/PYPI_TOKEN

  config-repo-write:
    description: GitHub token for writing deployment config repository updates.
    secrets:
      CONFIG_REPO_TOKEN:
        op: op://github-credential-broker-prod/config-repo-write/CONFIG_REPO_TOKEN

  digitalocean-spaces-read:
    description: Read-only DigitalOcean Spaces credentials.
    secrets:
      DIGITALOCEAN_SPACES_KEY:
        op: op://github-credential-broker-prod/digitalocean-spaces-read/DIGITALOCEAN_SPACES_KEY
      DIGITALOCEAN_SPACES_SECRET:
        op: op://github-credential-broker-prod/digitalocean-spaces-read/DIGITALOCEAN_SPACES_SECRET

  digitalocean-spaces-write:
    description: DigitalOcean Spaces credentials for asset and i18n updaters.
    secrets:
      DIGITALOCEAN_SPACES_KEY:
        op: op://github-credential-broker-prod/digitalocean-spaces-write/DIGITALOCEAN_SPACES_KEY
      DIGITALOCEAN_SPACES_SECRET:
        op: op://github-credential-broker-prod/digitalocean-spaces-write/DIGITALOCEAN_SPACES_SECRET

  broker-smoke-test:
    description: Non-sensitive broker smoke-test credential for this repository only.
    secrets:
      TEST_TOKEN:
        env: TEST_TOKEN

grants:
  - description: SplatTop production deploy workflows.
    allow:
      - repository: cesaregarza/SplatTop
        repository_id: "679054126"
        repository_owner_id: "40225001"
        ref: refs/heads/main
        environment: SplatTop
        workflow_ref: cesaregarza/SplatTop/.github/workflows/update_k8s_deployment.yaml@refs/heads/main
      - repository: cesaregarza/SplatTop
        repository_id: "679054126"
        repository_owner_id: "40225001"
        ref: refs/heads/main
        environment: SplatTop
        workflow_ref: cesaregarza/SplatTop/.github/workflows/monitoring-snapshots.yml@refs/heads/main
      - repository: cesaregarza/SplatTop
        repository_id: "679054126"
        repository_owner_id: "40225001"
        ref: refs/heads/main
        environment: SplatTop
        workflow_ref: cesaregarza/SplatTop/.github/workflows/sync_competition_admins_to_config.yml@refs/heads/main
    capabilities:
      - digitalocean-k8s-deploy
      - config-repo-write

  - description: SplatTop asset updater workflows.
    allow:
      - repository: cesaregarza/SplatTop
        repository_id: "679054126"
        repository_owner_id: "40225001"
        ref: refs/heads/main
        environment: SplatTop
        workflow_ref: cesaregarza/SplatTop/.github/workflows/update_assets.yml@refs/heads/main
      - repository: cesaregarza/SplatTop
        repository_id: "679054126"
        repository_owner_id: "40225001"
        ref: refs/heads/main
        environment: SplatTop
        workflow_ref: cesaregarza/SplatTop/.github/workflows/update_i18n.yaml@refs/heads/main
    capabilities:
      - digitalocean-spaces-write

  - description: SplatVote production deploy workflow.
    allow:
      - repository: cesaregarza/SplatVote
        repository_id: "1126936164"
        repository_owner_id: "40225001"
        ref: refs/heads/main
        environment: default
        workflow_ref: cesaregarza/SplatVote/.github/workflows/update_splatvote_config.yaml@refs/heads/main
    capabilities:
      - digitalocean-k8s-deploy
      - config-repo-write

  - description: SplatTopBlog production deploy workflow.
    allow:
      - repository: cesaregarza/SplatTopBlog
        repository_id: "1134030800"
        repository_owner_id: "40225001"
        ref: refs/heads/main
        environment: SplatTop
        workflow_ref: cesaregarza/SplatTopBlog/.github/workflows/deploy.yml@refs/heads/main
    capabilities:
      - digitalocean-k8s-deploy
      - config-repo-write

  - description: SplatTopTeams image publish workflow.
    allow:
      - repository: cesaregarza/SplatTopTeams
        repository_id: "1215338068"
        repository_owner_id: "40225001"
        ref: refs/heads/main
        environment: default
        workflow_ref: cesaregarza/SplatTopTeams/.github/workflows/verify_and_publish_images.yaml@refs/heads/main
    capabilities:
      - digitalocean-registry-write

  - description: SplatTopTeams refresh workflow.
    allow:
      - repository: cesaregarza/SplatTopTeams
        repository_id: "1215338068"
        repository_owner_id: "40225001"
        ref: refs/heads/main
        environment: default
        workflow_ref: cesaregarza/SplatTopTeams/.github/workflows/run_refresh.yaml@refs/heads/main
    capabilities:
      - digitalocean-team-search-refresh-runner
      - team-search-refresh-db-write

  - description: Sendouq scraper and aggregator workflows.
    allow:
      - repository: cesaregarza/sendouq_analysis
        repository_id: "728435415"
        repository_owner_id: "40225001"
        ref: refs/heads/main
        environment: Scraper
        workflow_ref: cesaregarza/sendouq_analysis/.github/workflows/run_scraper.yml@refs/heads/main
      - repository: cesaregarza/sendouq_analysis
        repository_id: "728435415"
        repository_owner_id: "40225001"
        ref: refs/heads/main
        environment: Scraper
        workflow_ref: cesaregarza/sendouq_analysis/.github/workflows/run_aggregator.yml@refs/heads/main
    capabilities:
      - digitalocean-scraper-job-runner
      - scraper-postgres-write

  - description: Sendouq rankings workflows.
    allow:
      - repository: cesaregarza/sendouq_analysis
        repository_id: "728435415"
        repository_owner_id: "40225001"
        ref: refs/heads/main
        environment: Scraper
        workflow_ref: cesaregarza/sendouq_analysis/.github/workflows/fix_tournaments.yml@refs/heads/main
      - repository: cesaregarza/sendouq_analysis
        repository_id: "728435415"
        repository_owner_id: "40225001"
        ref: refs/heads/main
        environment: Scraper
        workflow_ref: cesaregarza/sendouq_analysis/.github/workflows/repull_tournament.yml@refs/heads/main
      - repository: cesaregarza/sendouq_analysis
        repository_id: "728435415"
        repository_owner_id: "40225001"
        ref: refs/heads/main
        environment: Scraper
        workflow_ref: cesaregarza/sendouq_analysis/.github/workflows/run_weekly_loo.yml@refs/heads/main
    capabilities:
      - digitalocean-scraper-job-runner
      - rankings-db-write
      - sendouq-api-read
      - rankings-sentry-reporting

  - description: Sendouq ranked update workflow.
    allow:
      - repository: cesaregarza/sendouq_analysis
        repository_id: "728435415"
        repository_owner_id: "40225001"
        ref: refs/heads/main
        environment: Scraper
        workflow_ref: cesaregarza/sendouq_analysis/.github/workflows/run_ranked.yml@refs/heads/main
    capabilities:
      - digitalocean-scraper-job-runner
      - rankings-db-write
      - sendouq-api-read
      - rankings-sentry-reporting
      - rankings-spaces-write

  - description: Sendouq scraper image publish workflow.
    allow:
      - repository: cesaregarza/sendouq_analysis
        repository_id: "728435415"
        repository_owner_id: "40225001"
        ref: refs/heads/main
        environment: Scraper
        workflow_ref: cesaregarza/sendouq_analysis/.github/workflows/build_scraper.yml@refs/heads/main
    capabilities:
      - digitalocean-registry-write

  - description: SplatNet3_Scraper release workflow.
    allow:
      - repository: cesaregarza/SplatNet3_Scraper
        repository_id: "586660348"
        repository_owner_id: "40225001"
        ref: refs/heads/main
        workflow_ref: cesaregarza/SplatNet3_Scraper/.github/workflows/main.yaml@refs/heads/main
    capabilities:
