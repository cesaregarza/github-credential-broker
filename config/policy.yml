      - splatnet3-package-pypi-publish

  - description: SplatNet3_Scraper query hash update workflow.
    allow:
      - repository: cesaregarza/SplatNet3_Scraper
        repository_id: "586660348"
        repository_owner_id: "40225001"
        ref: refs/heads/main
        workflow_ref: cesaregarza/SplatNet3_Scraper/.github/workflows/refresh_graphql_jsons.yml@refs/heads/main
    capabilities:
      - splatnet3-github-write

  - description: Broker repository smoke test workflow.
    allow:
      - repository: cesaregarza/github-credential-broker
        repository_id: "1221081539"
        repository_owner_id: "40225001"
        ref: refs/heads/main
        workflow_ref: cesaregarza/github-credential-broker/.github/workflows/broker-smoke-test.yml@refs/heads/main
    capabilities:
