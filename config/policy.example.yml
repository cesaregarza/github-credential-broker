version: 1

strict: true

# Strict mode requires repository_id in every allow rule. Repository names can
# be transferred, but IDs cannot.

defaults:
  audit_claims:
    - repository
    - ref
    - environment
    - workflow_ref
    - job_workflow_ref
    - run_id
    - run_attempt

capabilities:
  digitalocean-k8s-deploy:
    description: DigitalOcean credentials for Kubernetes deployment updates.
    secrets:
      DIGITALOCEAN_ACCESS_TOKEN:
        op: op://github-credential-broker-prod/digitalocean-k8s-deploy/DIGITALOCEAN_ACCESS_TOKEN
      DIGITALOCEAN_CLUSTER_ID:
        op: op://github-credential-broker-prod/digitalocean-k8s-deploy/DIGITALOCEAN_CLUSTER_ID

  config-repo-write:
    description: GitHub token for writing deployment config repository updates.
    secrets:
      CONFIG_REPO_TOKEN:
        op: op://github-credential-broker-prod/config-repo-write/CONFIG_REPO_TOKEN

  digitalocean-spaces-read:
    description: Read-only DigitalOcean Spaces credentials.
    secrets:
      DIGITALOCEAN_SPACES_KEY:
        op: op://github-credential-broker-prod/digitalocean-spaces-read/DIGITALOCEAN_SPACES_KEY
      DIGITALOCEAN_SPACES_SECRET:
        op: op://github-credential-broker-prod/digitalocean-spaces-read/DIGITALOCEAN_SPACES_SECRET

  digitalocean-spaces-write:
    description: DigitalOcean Spaces credentials for asset and i18n updaters.
    secrets:
      DIGITALOCEAN_SPACES_KEY:
        op: op://github-credential-broker-prod/digitalocean-spaces-write/DIGITALOCEAN_SPACES_KEY
      DIGITALOCEAN_SPACES_SECRET:
        op: op://github-credential-broker-prod/digitalocean-spaces-write/DIGITALOCEAN_SPACES_SECRET

  broker-smoke-test:
    description: Non-sensitive broker smoke-test credential for this repository only.
    secrets:
      TEST_TOKEN:
        env: TEST_TOKEN

grants:
  - description: SplatTop production deploy workflows.
    allow:
      - repository: cesaregarza/SplatTop
        repository_id: "679054126"
        repository_owner_id: "40225001"
        ref: refs/heads/main
        environment: SplatTop
        workflow_ref: cesaregarza/SplatTop/.github/workflows/update_k8s_deployment.yaml@refs/heads/main
      - repository: cesaregarza/SplatTop
        repository_id: "679054126"
        repository_owner_id: "40225001"
        ref: refs/heads/main
        environment: SplatTop
        workflow_ref: cesaregarza/SplatTop/.github/workflows/monitoring-snapshots.yml@refs/heads/main
      - repository: cesaregarza/SplatTop
        repository_id: "679054126"
        repository_owner_id: "40225001"
        ref: refs/heads/main
        environment: SplatTop
        workflow_ref: cesaregarza/SplatTop/.github/workflows/sync_competition_admins_to_config.yml@refs/heads/main
    capabilities:
      - digitalocean-k8s-deploy
      - config-repo-write

  - description: SplatTop asset updater workflows.
    allow:
      - repository: cesaregarza/SplatTop
        repository_id: "679054126"
        repository_owner_id: "40225001"
        ref: refs/heads/main
        environment: SplatTop
        workflow_ref: cesaregarza/SplatTop/.github/workflows/update_assets.yml@refs/heads/main
      - repository: cesaregarza/SplatTop
        repository_id: "679054126"
        repository_owner_id: "40225001"
        ref: refs/heads/main
        environment: SplatTop
        workflow_ref: cesaregarza/SplatTop/.github/workflows/update_i18n.yaml@refs/heads/main
    capabilities:
      - digitalocean-spaces-write

  - description: SplatVote production deploy workflow.
    allow:
      - repository: cesaregarza/SplatVote
        repository_id: "1126936164"
        repository_owner_id: "40225001"
        ref: refs/heads/main
        environment: default
        workflow_ref: cesaregarza/SplatVote/.github/workflows/update_splatvote_config.yaml@refs/heads/main
    capabilities:
      - digitalocean-k8s-deploy
      - config-repo-write

  - description: SplatTopBlog production deploy workflow.
    allow:
      - repository: cesaregarza/SplatTopBlog
        repository_id: "1134030800"
        repository_owner_id: "40225001"
        ref: refs/heads/main
        environment: SplatTop
        workflow_ref: cesaregarza/SplatTopBlog/.github/workflows/deploy.yml@refs/heads/main
    capabilities:
      - digitalocean-k8s-deploy
      - config-repo-write

  - description: Broker repository smoke test workflow.
    allow:
      - repository: cesaregarza/github-credential-broker
        repository_id: "1221081539"
        repository_owner_id: "40225001"
        ref: refs/heads/main
        workflow_ref: cesaregarza/github-credential-broker/.github/workflows/broker-smoke-test.yml@refs/heads/main
    capabilities:
      - broker-smoke-test
