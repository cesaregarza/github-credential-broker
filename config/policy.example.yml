version: 1

strict:
  required_claims:
    - repository_id
    - repository_owner_id

defaults:
  audit_claims:
    - repository
    - ref
    - environment
    - workflow_ref
    - job_workflow_ref
    - run_id
    - run_attempt

capabilities:
  app-deploy:
    description: Cloud credentials for a production deployment workflow.
    required_claims:
      - repository_id
      - repository_owner_id
      - ref
      - environment
      - job_workflow_ref
    secrets:
      CLOUD_ACCESS_TOKEN:
        op: op://github-credential-broker-example/app-deploy/CLOUD_ACCESS_TOKEN

  config-repo-write:
    description: Token for writing deployment config updates.
    secrets:
      EXAMPLE_CONFIG_GITHUB_TOKEN:
        op: op://github-credential-broker-example/config-repo-write/EXAMPLE_CONFIG_GITHUB_TOKEN

  broker-smoke-test:
    description: Non-sensitive broker smoke-test credential.
    secrets:
      TEST_TOKEN:
        env: TEST_TOKEN

grants:
  - description: Example production deploy workflow.
    allow:
      - repository: owner/example-app
        repository_id: "123456789"
        repository_owner_id: "987654321"
        ref: refs/heads/main
        environment: production
        workflow_ref: owner/example-app/.github/workflows/deploy.yml@refs/heads/main
        job_workflow_ref: owner/.github/.github/workflows/deploy.yml@refs/heads/main
        job_workflow_sha: 0123456789abcdef0123456789abcdef01234567
    capabilities:
      - app-deploy
      - config-repo-write

  - description: Example broker smoke-test workflow.
    allow:
      - repository: owner/github-credential-broker
        repository_id: "222222222"
        repository_owner_id: "987654321"
        ref: refs/heads/main
        workflow_ref: owner/github-credential-broker/.github/workflows/broker-smoke-test.yml@refs/heads/main
    capabilities:
      - broker-smoke-test
