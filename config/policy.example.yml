version: 1

# Set strict: true to require repository_id in every allow rule. Recommended
# for production policies — repository names can be transferred, IDs cannot.
# strict: true

defaults:
  audit_claims:
    - repository
    - ref
    - environment
    - workflow_ref
    - job_workflow_ref
    - run_id
    - run_attempt

bundles:
  splattop-deploy:
    description: SplatTop production deploy credentials.
    allow:
      - repository: cesaregarza/SplatTop
        # Add repository_id and repository_owner_id for production policies.
        ref: refs/heads/main
        environment: SplatTop
    secrets:
      DIGITALOCEAN_ACCESS_TOKEN:
        op: op://github-credential-broker-prod/splattop-deploy/DIGITALOCEAN_ACCESS_TOKEN
      CONFIG_REPO_TOKEN:
        op: op://github-credential-broker-prod/splattop-deploy/CONFIG_REPO_TOKEN

  splatvote-deploy:
    description: SplatVote production deploy credentials.
    allow:
      - repository: cesaregarza/SplatVote
        # Add repository_id and repository_owner_id for production policies.
        ref: refs/heads/main
        environment: default
    secrets:
      DIGITALOCEAN_ACCESS_TOKEN:
        op: op://github-credential-broker-prod/splatvote-deploy/DIGITALOCEAN_ACCESS_TOKEN
      CONFIG_REPO_TOKEN:
        op: op://github-credential-broker-prod/splatvote-deploy/CONFIG_REPO_TOKEN
